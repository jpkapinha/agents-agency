version: "3.9"

# =============================================================================
# jpkapinha/agents-agency
# Spin up the full Web3 agency with: docker compose up -d
# =============================================================================

networks:
  agency-net:
    driver: bridge

services:
  # ---------------------------------------------------------------------------
  # Core agency service — all AI agents run inside this container
  # ---------------------------------------------------------------------------
  agency:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/jpkapinha/agents-agency:latest
    # FIX: Renamed from nanoclaw-agency — NanoClaw's cleanupOrphans() scans
    #      for containers matching "nanoclaw-*" and stops them, which caused
    #      the container to kill itself seconds after starting
    container_name: project0-agency
    restart: unless-stopped

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false   # NanoClaw writes runtime state

    # FIX: Removed top-level `secrets:` block and service `secrets:` reference
    #      — secrets/git_deploy_key does not exist in the repo; Docker Compose
    #      errors out at startup if a referenced secret file is missing.
    #      The load-web3-skills.sh script already handles the missing-key case.

    environment:
      # Loaded from .env file (copy .env.example → .env)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_PM_CHANNEL_ID=${DISCORD_PM_CHANNEL_ID}
      - GITHUB_ORG=${GITHUB_ORG:-jpkapinha}
      - PROJECT_NAME=${PROJECT_NAME:-my-web3-project}
      - COST_WARNING_THRESHOLD_USD=${COST_WARNING_THRESHOLD_USD:-5}
      - WEB3_SKILLS_REPO=${WEB3_SKILLS_REPO:-git@github.com:protofire/web3-skills.git}
      - NODE_ENV=production

    volumes:
      # Project workspace — your code lives here
      - ./project-data:/workspace
      # Model routing config (read-only)
      - ./config:/app/config:ro
      # Docker socket passthrough for MicroVM sandboxing
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - agency-net

    # FIX: Changed healthcheck from `node -e "require('/app/nanoclaw/dist/health')"` —
    #      dist/ is never built (NanoClaw runs via tsx from source), so that check
    #      always fails and the container is permanently marked unhealthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "tsx"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
