version: "3.9"

# =============================================================================
# jpkapinha/agents-agency
# Spin up the full Web3 agency with: docker compose up -d
# =============================================================================

# SSH deploy key for private protofire/web3-skills access.
# Create it: see README.md → "SSH Deploy Key Setup"
# If the file does not exist, comment out this block and the `secrets:` key
# under the service — the agency will still start, just without web3-skills.
secrets:
  git_deploy_key:
    file: ./secrets/git_deploy_key

networks:
  agency-net:
    driver: bridge

services:
  # ---------------------------------------------------------------------------
  # Core agency service — all AI agents run inside this container
  # ---------------------------------------------------------------------------
  agency:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/jpkapinha/agents-agency:latest
    # NOTE: Do NOT name this "nanoclaw-*" — NanoClaw's cleanupOrphans() scans
    #       for containers matching that prefix and will stop itself on startup.
    container_name: project0-agency
    restart: unless-stopped

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false   # NanoClaw writes runtime state

    secrets:
      - git_deploy_key

    environment:
      # Loaded from .env file (copy .env.example → .env)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_PM_CHANNEL_ID=${DISCORD_PM_CHANNEL_ID}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_ORG=${GITHUB_ORG:-jpkapinha}
      - PROJECT_NAME=${PROJECT_NAME:-my-web3-project}
      - COST_WARNING_THRESHOLD_USD=${COST_WARNING_THRESHOLD_USD:-5}
      - WEB3_SKILLS_REPO=${WEB3_SKILLS_REPO:-git@github.com:protofire/web3-skills.git}
      - NODE_ENV=production

    volumes:
      # Project workspace — your code lives here
      - ./project-data:/workspace
      # Model routing config (read-only)
      - ./config:/app/config:ro
      # Docker socket passthrough for MicroVM sandboxing
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - agency-net

    healthcheck:
      test: ["CMD", "pgrep", "-f", "tsx"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
